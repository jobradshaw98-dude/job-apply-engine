<!doctype html><html><head><meta charset="utf-8"><title>Ashby Apply</title></head><body>
<!-- Mirrors live jobs.ashbyhq.com/.../application: system fields by id, phone may vary -->
<form>
  <input id="_systemfield_name" name="_systemfield_name" type="text" placeholder="Type here...">
  <input id="_systemfield_email" name="_systemfield_email" type="email" placeholder="hello@example.com">
  <input id="phone" name="phone" type="tel" placeholder="Type here...">
  <input id="_systemfield_resume" type="file">
  <label for="f_auth">Are you authorized to work in the United States?</label>
  <select id="f_auth" name="auth"><option value="">-</option>
    <option value="yes">Yes</option><option value="no">No</option></select>
  <button type="button">Submit Application</button>
</form></body></html>
