<!doctype html>
<html>
<head><meta charset="utf-8"><title>Y/N button form</title></head>
<body>
  <h1>Apply</h1>
  <form>
    <div>
      <label for="fullname">Full name *</label>
      <input id="fullname" name="name" type="text" required>
    </div>
    <div>
      <label for="email">Email *</label>
      <input id="email" name="email" type="email" required>
    </div>

    <!-- Ashby-style custom Y/N button group: NO native input, label carries the * -->
    <div class="application-field">
      <label>Are you willing to relocate to our office 2-3 days per week? *</label>
      <button type="button">Yes</button>
      <button type="button">No</button>
    </div>

    <!-- a work-auth Y/N: the work-auth guard answers this, so it must NOT block -->
    <div class="application-field">
      <label>Are you authorized to work in the U.S.? *</label>
      <button type="button">Yes</button>
      <button type="button">No</button>
    </div>

    <!-- a genuinely-unanswerable required screening Y/N: not work-auth, not an office/relocation
         commitment, and ungrounded without an LLM -> the engine must leave it unanswered and force
         needs_input rather than a false ready_to_submit. -->
    <div class="application-field">
      <label>Do you currently hold an active U.S. security clearance? *</label>
      <button type="button">Yes</button>
      <button type="button">No</button>
    </div>

    <!-- an OPTIONAL Y/N (no *): must not be flagged -->
    <div class="application-field">
      <label>Would you like to subscribe to our newsletter?</label>
      <button type="button">Yes</button>
      <button type="button">No</button>
    </div>
  </form>
</body>
</html>
