<!doctype html><html><head><meta charset="utf-8"><title>Lever Apply</title></head><body>
<!-- Mirrors live jobs.lever.co/.../apply: name-attribute inputs, #resume-upload-input -->
<form>
  <input id="resume-upload-input" name="resume" type="file">
  <input name="name" type="text" placeholder="Full name">
  <input name="email" type="email" placeholder="Email">
  <input name="phone" type="text" placeholder="Phone">
  <input name="urls[LinkedIn]" type="text" placeholder="LinkedIn URL">
  <label for="wa">Are you authorized to work in the United States?</label>
  <select id="wa" name="cards[abc][field0]">
    <option value="">Select</option><option value="yes">Yes</option><option value="no">No</option>
  </select>
  <button id="btn-submit" type="button">Submit application</button>
</form></body></html>
