<!doctype html><html><head><meta charset="utf-8"><title>Visible reCAPTCHA form</title></head>
<body>
<!-- A VISIBLE reCAPTCHA v2 widget (the "I'm not a robot" checkbox) — a human must interact.
     detect_captcha -> "recaptcha_visible". The .g-recaptcha div is rendered (78px tall) and the
     anchor iframe is visible. -->
<form>
  <input id="email" type="email">
  <div class="g-recaptcha" data-sitekey="6Lc_aCMTAAAAxyz" style="width:304px;height:78px">
    <iframe src="https://www.google.com/recaptcha/api2/anchor?..." title="reCAPTCHA"
            style="width:304px;height:78px"></iframe>
  </div>
  <button type="submit">Submit Application</button>
</form>
</body></html>
