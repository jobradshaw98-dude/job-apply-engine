<!doctype html><html><head><meta charset="utf-8"><title>hCaptcha-gated form</title></head>
<body>
<!-- A form gated by hCaptcha: a human must solve it. detect_captcha -> "hcaptcha". -->
<form>
  <input id="email" type="email">
  <div class="h-captcha" data-sitekey="10000000-ffff-ffff-ffff-000000000001"></div>
  <iframe src="https://newassets.hcaptcha.com/captcha/v1/..." title="hCaptcha"
          style="width:303px;height:78px"></iframe>
  <button type="submit">Submit Application</button>
</form>
</body></html>
