[pytest]
testpaths = apply_engine/tests
# Public-portfolio test configuration.
#
# A handful of tests depend on resources that live OUTSIDE this package in the
# original (private) monorepo and are intentionally NOT published here:
#   - audit_gate.py / regen_content.py  (sibling modules in the private repo root)
#   - claims_ledger.md                  (a private claims ledger read by the
#                                         real-LLM prose-rule tests)
# Those tests cannot run from this standalone public copy, so they are excluded
# below. Everything else runs offline with no API key, network, or browser.
#
# The `llm` marker covers slow tests that shell out to the real `claude` CLI;
# they are opt-in only (run them explicitly with `-m llm`).
markers =
    llm: slow test that shells out to the real Claude CLI; opt-in via `-m llm`.
    browser: test drives a live Chromium-family browser; deselected by default (CI has no browser).

# Deselect the opt-in real-CLI tests AND the live-browser tests (the offline CI
# image installs no Chromium/Chrome), and skip the modules that need the private
# sibling files listed above. The `browser` marker is applied automatically in
# conftest.py to any test whose reachable source drives a live page
# (launch_profile / apply_to_job); run those explicitly with `-m browser`.
addopts =
    -m "not llm and not browser"
    --ignore=apply_engine/tests/test_impact_count_gate.py
    --ignore=apply_engine/tests/test_regen_content_self_heal.py
    --ignore=apply_engine/tests/test_regen_pre_guard_crash.py
    --ignore=apply_engine/tests/test_stale_rule_cleanup.py
    --ignore=apply_engine/tests/test_emdash_backstop.py
